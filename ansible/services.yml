# Service + role definitions for host validation and templating
#
# Roles describe reusable behaviors that may span multiple compose services
# (e.g., airflow-worker depends on a storagebox mount). Service labels describe
# the expected compose service(s) when a host lists the item in
# uuid_registry.yml `services:`.
#
# Schema keys:
#   requires_params: Parameters that must exist on the host's role config
#   requires_roles:  Other roles that must also be present
#   compose_service: Primary compose service name to enforce presence of
#   requires_secrets: Environment variables that must be set when rendering
#   prom_check:      Prometheus freshness check metadata
#     metric:        Metric name expected for freshness
#     probe_metric:  Metric string to look for when probing exporter (optional)
#     port:          Exporter port
#     auth:          Whether to use basic auth (optional)
#   description:     Human readable summary (optional)
#
# Hosts declare roles in uuid_registry.yml:
#   roles:
#     airflow-worker:
#       concurrency: 2
#     storagebox0: {}

roles:
  storagebox0:
    description: "Hetzner storagebox CIFS/SSHFS mount at /mnt/storagebox0"
    requires_params: []
    requires_roles: []
    requires_secrets: []
    compose_service: null  # Not a container, it's a mount
    mount_point: /mnt/storagebox0

  airflow-worker:
    description: "Airflow Celery worker connecting to central broker"
    requires_params:
      - concurrency
    requires_roles:
      - storagebox0  # Workers need access to DAGs on shared storage
    compose_service: airflow-worker
    requires_secrets:
      - postgresql_rw_password_airflow
      - redis_password
      - airflow_fernet_key
    environment:
      # These are templated from BWS secrets at deploy time
      broker_url: "redis://:{{ redis_password }}@100.78.109.111:6379/0"
      result_backend: "db+postgresql://rw_airflow:{{ postgresql_rw_password_airflow }}@100.78.109.111:5432/airflow"

services:
  node-exporter:
    description: "Prometheus node exporter"
    group: nodes
    compose_service: node-exporter
    requires_secrets:
      - node_exporter_password
      - node_exporter_hash
    prom_check:
      metric: node_cpu_seconds_total
      probe_metric: node_cpu_seconds_total
      port: 9100
      auth: true

  cadvisor:
    description: "Container metrics exporter"
    group: nodes
    compose_service: cadvisor
    requires_secrets: []
    prom_check:
      metric: container_cpu_usage_seconds_total
      probe_metric: container_cpu_usage_seconds_total
      port: 8080

  prometheus:
    description: "Prometheus server"
    group: observability
    compose_service: prometheus
    requires_secrets:
      - node_exporter_password

  grafana:
    description: "Grafana server"
    group: observability
    compose_service: grafana
    requires_secrets:
      - grafana_admin_password

  blackbox:
    description: "Prometheus blackbox exporter"
    group: observability
    compose_service: blackbox-exporter
    requires_secrets: []
    prom_check:
      metric: probe_success
      probe_metric: probe_success
      port: 9115

  stackdriver-dataflow:
    description: "Stackdriver exporter (Dataflow)"
    group: observability
    compose_service: stackdriver-exporter
    requires_secrets: []
    prom_check:
      metric: stackdriver_dataflow_job_dataflow_googleapis_com_job_active_worker_instances
      probe_metric: stackdriver_dataflow_job_dataflow_googleapis_com_job_active_worker_instances
      port: 9255
      instance: stackdriver-exporter:9255

  stackdriver-bigquery:
