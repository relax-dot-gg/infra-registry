server {
        listen 80;
        server_name _;

    	include /etc/nginx/conf.d/snippets/le.conf;
        location / {
                return https://$host$request_uri;
        }
        location /nginx_status {
            allow 195.154.26.125;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
            stub_status;
            access_log off;
        }
}

split_clients $request_id $logme {
    5%     1;
    *      0;
}

map $http_origin $cors_header {
    default "";
    ~^https://([a-z0-9-]+\.)*bdsmlr\.com(:[0-9]+)?$ $http_origin;
    "https://shop.bdsmlr.com" $http_origin;
    "https://shop.i4chan.org" $http_origin;
}

server {
#    listen 80 default_server;
#    listen [::]:80 default_server;

    listen 443 ssl;

    access_log /var/log/nginx/bdsmlr-access.log combined buffer=32k if=$logme;
#    access_log  off;
    error_log /var/log/nginx/bdsmlr.com.log;

#    client_body_timeout 5s;
#    client_header_timeout 5s;
    client_header_buffer_size 84k;

    large_client_header_buffers 64 558k;

    root /var/www/html/public;

    index index.php;
    server_name bdsmlr.com;

    client_max_body_size 1000M;

    ssl_certificate /etc/ssl/bdsmlr_com_chain.crt;
    ssl_certificate_key /etc/ssl/bdsmlr.key;

    proxy_buffer_size   2128k;
    proxy_buffers   4 11256k;
    proxy_busy_buffers_size   11256k;


    location ~ "^/(apiv1/shop-verifyname|apiv1/shop-whoami).*" {
    
    	fastcgi_param  QUERY_STRING       $query_string;
    	fastcgi_param  REQUEST_METHOD     $request_method;
    	fastcgi_param  CONTENT_TYPE       $content_type;
    	fastcgi_param  CONTENT_LENGTH     $content_length;
    
    	fastcgi_param  SCRIPT_NAME        $fastcgi_script_name;
    	fastcgi_param  REQUEST_URI        $request_uri;
    	fastcgi_param  DOCUMENT_URI       $document_uri;
    	fastcgi_param  DOCUMENT_ROOT      $document_root;
    	fastcgi_param  SERVER_PROTOCOL    $server_protocol;
    	fastcgi_param  REQUEST_SCHEME     $scheme;
    	fastcgi_param  HTTPS              $https if_not_empty;
    
    	fastcgi_param  GATEWAY_INTERFACE  CGI/1.1;
    	fastcgi_param  SERVER_SOFTWARE    nginx/$nginx_version;
    
    	fastcgi_param  REMOTE_ADDR        $remote_addr;
    	fastcgi_param  REMOTE_PORT        $remote_port;
    	fastcgi_param  SERVER_ADDR        $server_addr;
    	fastcgi_param  SERVER_PORT        $server_port;
    	fastcgi_param  SERVER_NAME        $server_name;
    
    
    
#    	add_header Access-Control-Allow-Origin "https://shop.bdsmlr.com" always;
    	add_header Access-Control-Allow-Origin $cors_header always;
    	add_header Vary Origin always;
#	add_header Access-Control-Allow-Credentials 'true';
    
    
    	fastcgi_pass_header Access-Control-Allow-Origin;
    
    	fastcgi_param SCRIPT_NAME /index.php;
    	fastcgi_param SCRIPT_FILENAME $document_root/index.php;
    	fastcgi_param PATH_INFO /apiv1/whoami/;
    
   	fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
    
    	access_log /var/log/nginx/bdsmlr-alloworigin.log;
    }

    location ~ .php$ {

	add_header Access-Control-Allow-Origin $cors_header always;
	add_header Vary Origin always;
	add_header Access-Control-Allow-Credentials 'true';
        include /etc/nginx/conf.d/snippets/fastcgi-php.conf;
        fastcgi_split_path_info ^(.+.php)(/.+)$;
        fastcgi_pass unix:/var/run/php/php7.4-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
#        fastcgi_read_timeout 5;
#	fastcgi_send_timeout 5;

    }

    include /etc/nginx/conf.d/snippets/le.conf;

    location / {
        root /var/www/html/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /uploads/ {
		expires 365d;
		add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
		expires 365d;
		add_header Cache-Control "public, max-age=2592000";
    }
    location ~* \.(eot|ttf|woff|woff2)$ {
    	add_header Access-Control-Allow-Origin *;
    }

	location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
		expires 365d;
    }

	location ~* \.io {
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header Host $http_host;
		proxy_set_header X-NginX-Proxy true;
		proxy_pass https://bdsmlr.com:8443;
		proxy_redirect off;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
    }

	location ~ \.mp3$ {
		if (!-f $request_filename) {
		rewrite ^/(.*) https://vid02.bdsmlr.com/$1 break;
		}
	}

	location ^~ /uploads/video/ {
		add_header Cache-Control "public, max-age=2592000";
		if (!-f $request_filename) {
			rewrite ^/(.*) https://cdn013.bdsmlr.com/$1 break;
		}
	}


        location ^~ /uploads/videos/ { 
		add_header Cache-Control "public, max-age=2592000";
 
		if (!-f $request_filename) { 
			rewrite ^/(.*) https://cdn013.bdsmlr.com/$1 break; 
		} 
	}

        if ($uri ~ ^/uploads/photos/(201[5-9])) { 
		rewrite ^/(.*) https://cdn101.bdsmlr.com/$1 break; 
        	} 

        location ^~ /uploads/photos/ { 
		if ($remote_addr != 195.154.26.125) {
		  rewrite ^/(.*) https://ocdn012.bdsmlr.com/$1 break; 
		}
	}

        location ^~ /uploads/blogs/ { 
		add_header Cache-Control "public, max-age=2592000";
 
        if ($uri ~ ^/uploads/blogs/(201[5-9]|202[0-1])) { 
		rewrite ^/(.*) https://cdn101.bdsmlr.com/$1 break; 
        	} 

        if ($uri ~ ^/uploads/blogs/202[2-9]) { 
		rewrite ^/(.*) https://ocdn012.bdsmlr.com/$1 break; 
        	} 
	}


#disable chat
#	location ~ /(getchat|countmessage|getmessage|messages) {
#		return 503;
#	}
##
        location /d0831f089fa91f32689d8c7ee3db7e2e.html {
               alias /var/www/html//d0831f089fa91f32689d8c7ee3db7e2e.html;
        }

	location ~ \.mp4$ {
		    mp4;
	            mp4_buffer_size 40M;
	            mp4_max_buffer_size 100M;
	            limit_rate_after 150k;
		add_header Cache-Control "public, max-age=2592000";
		if (!-f $request_filename) {
		rewrite ^/(.*) https://cdn05.bdsmlr.com/$1 break;
	}
		if ($http_referer !~* ^https?:\/\/(bdsmlr.com|(.*)\.bdsmlr.com).*) {
		return 403;
	}
    }
}
