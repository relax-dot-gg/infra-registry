# VTS/metrics endpoint for Prometheus
server {
  listen 8080;
  server_name _;

  # Restrict to tailnet/local
  allow 127.0.0.1;
  allow 10.0.0.0/8;
  allow 100.64.0.0/10;  # Tailscale
  deny all;

  location /status {
    vhost_traffic_status_display;
    vhost_traffic_status_display_format prometheus;
  }
}
