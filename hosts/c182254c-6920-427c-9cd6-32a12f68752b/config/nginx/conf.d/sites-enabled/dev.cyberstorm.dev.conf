server {
  listen 80;
  server_name dev.cyberstorm.dev;

  root /srv/static-sites/dev.cyberstorm.dev/public;
  index index.html;

  access_log /var/log/nginx/dev.cyberstorm.dev.access.log;
  error_log /var/log/nginx/dev.cyberstorm.dev.error.log warn;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
