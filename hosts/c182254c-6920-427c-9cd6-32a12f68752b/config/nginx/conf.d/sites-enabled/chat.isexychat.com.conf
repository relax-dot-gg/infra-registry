server {
  listen 80;
  server_name chat.isexychat.com;

  root /srv/static-sites/chat.isexychat.com/public;
  index index.html;

  access_log /var/log/nginx/chat.isexychat.com.access.log;
  error_log /var/log/nginx/chat.isexychat.com.error.log warn;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
