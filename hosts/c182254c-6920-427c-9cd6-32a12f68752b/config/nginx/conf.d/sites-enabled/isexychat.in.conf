server {
  listen 80;
  server_name isexychat.in;

  root /srv/static-sites/isexychat.in/public;
  index index.html;

  access_log /var/log/nginx/isexychat.in.access.log;
  error_log /var/log/nginx/isexychat.in.error.log warn;

  # Serve the SPA index directly to avoid try_files recursion
  location = /index.html {
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
