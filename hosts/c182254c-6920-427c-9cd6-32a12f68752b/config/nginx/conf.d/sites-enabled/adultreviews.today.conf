server {
  listen 80;
  server_name adultreviews.today;

  root /srv/static-sites/adultreviews.today/public;
  index index.html;

  access_log /var/log/nginx/adultreviews.today.access.log;
  error_log /var/log/nginx/adultreviews.today.error.log warn;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
