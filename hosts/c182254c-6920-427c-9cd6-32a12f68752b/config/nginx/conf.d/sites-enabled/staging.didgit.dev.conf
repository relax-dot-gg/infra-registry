server {
  listen 80;
  server_name staging.didgit.dev;

  root /srv/static-sites/staging.didgit.dev/public;
  index index.html;

  access_log /var/log/nginx/staging.didgit.dev.access.log;
  error_log /var/log/nginx/staging.didgit.dev.error.log warn;

  location / {
    try_files $uri $uri/ /index.html;
  }
}
