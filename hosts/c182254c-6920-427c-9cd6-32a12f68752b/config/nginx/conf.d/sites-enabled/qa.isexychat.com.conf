server {
  listen 80;
  server_name qa.isexychat.com;

  root /srv/static-sites-nonprod/qa.isexychat.com/public;
  index index.html;

  access_log /var/log/nginx/qa.isexychat.com.access.log;
  error_log /var/log/nginx/qa.isexychat.com.error.log warn;

  location /blog-images/ {
    alias /srv/static-blobs/qa.isexychat.com/blog-images/;
  }

  location /blog/ {
    alias /srv/static-blobs/qa.isexychat.com/blog/;
    try_files $uri $uri/ =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
