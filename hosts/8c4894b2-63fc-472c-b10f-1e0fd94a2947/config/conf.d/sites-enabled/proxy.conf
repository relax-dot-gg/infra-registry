log_format proxy_log '$remote_addr - [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer" "$http_user_agent" '
'$request_time $upstream_response_time '
'$upstream_connect_time $upstream_header_time';

map $host $bucket {
    default     $host;
    cdn012.bdsmlr.com      ocdn012.bdsmlr.com;
}

map $uri $content_type_override {
    ~*\.gif$  image/gif;
    ~*\.jpg$  image/jpeg;
    ~*\.jpeg$ image/jpeg;
    ~*\.png$  image/png;
    ~*\.webp$ image/webp;
    ~*\.mp4$  video/mp4;
    ~*\.webm$ video/webm;
    ~*\.mp3$  audio/mpeg;
    ~*\.m4a$  audio/mp4;
    ~*\.aac$  audio/aac;
    ~*\.ogg$  audio/ogg;
    ~*\.wav$  audio/wav;
    ~*\.flac$ audio/flac;
    default   application/octet-stream;
}

upstream imageproxy_upstream {
    server imageproxy:8080;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name cdn012.bdsmlr.com ocdn012.bdsmlr.com cdn101.bdsmlr.com cdn013.bdsmlr.com;

    resolver 127.0.0.11 1.1.1.1 valid=30s;

    ssl_certificate /etc/nginx/certs/cdn012.bdsmlr.com.crt;
    ssl_certificate_key /etc/nginx/certs/cdn012.bdsmlr.com.key;

    access_log /var/log/nginx/access.log combined buffer=16k;
    access_log /var/log/nginx/cdn_proxy.log proxy_log buffer=16k;

    location /uploads/ {
        proxy_intercept_errors on;
        error_page 404 403 @404;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host s3.wasabisys.com;
        proxy_ssl_name s3.wasabisys.com;
        proxy_ssl_server_name on;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        proxy_pass https://s3.wasabisys.com/$bucket$request_uri;
        proxy_hide_header Content-Disposition;
        proxy_hide_header Content-Type;
        add_header Content-Type $content_type_override;
    }

    # Previews: /uploads/preview/<opts>/<path>
    location ~ ^/uploads/preview/([^/]+)/(.+)$ {
        set $opts $1;
        set $path $2;
        set $imageproxy_path /$opts/https://s3.wasabisys.com/$bucket/uploads/$path;
        proxy_pass http://imageproxy_upstream$imageproxy_path$is_args$args;
    }

    location @404 {
        # Fallback for missing avatars
        if ($uri ~ /avatar/) {
            return 302 https://bdsmlr.com/assets/images/default_avatar.png;
        }
        # Fallback for missing backgrounds
        if ($uri ~ /(background|blogbackground)/) {
            return 302 https://bdsmlr.com/assets/images/default_public_blog_bg.jpg;
        }
        # Default behavior unchanged
        return 404 "404";
    }

    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}
