receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resourcedetection:
    detectors: [system]
    override: false
  batch: {}

exporters:
  prometheus:
    endpoint: "0.0.0.0:9464"
    enable_open_metrics: true
  loki:
    endpoint: http://loki:3100/loki/api/v1/push
  logging:
    verbosity: basic
  # googlecloud:
  #   project: ${GCP_PROJECT_ID}
  #   user_agent: relaxgg-otel-collector
  #   log:
  #     default_log_name: otel-collector
  #     enable_log_profiles: true
  #   metric:
  #     enable_sum_to_gauge_conversion: true
  #   trace:
  #     attribute_mappings:
  #       - key: service.namespace
  #         replacement: environment

extensions:
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, pprof, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [logging]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [loki, logging]
