log_format proxy_log '$remote_addr - [$time_local] '
'"$request" $status $body_bytes_sent '
'"$http_referer" "$http_user_agent" '
'$request_time $upstream_response_time '
'$upstream_connect_time $upstream_header_time';

upstream imageproxy_upstream {
    server imageproxy:8080;
}

server {
    listen 80;
    listen 443 ssl http2;
    server_name cdn012.reblogme.com cdn002.reblogme.com cdn07.reblogme.com cdn02.reblogme.com;

    resolver 127.0.0.11 1.1.1.1 valid=30s;

    ssl_certificate /etc/nginx/certs/certificates/cdn001.reblogme.com.crt;
    ssl_certificate_key /etc/nginx/certs/certificates/cdn001.reblogme.com.key;

    access_log /var/log/nginx/access.log combined buffer=16k;
    access_log /var/log/nginx/cdn_proxy.log proxy_log buffer=16k;

    location /uploads/ {
        proxy_intercept_errors on;
        error_page 404 @404;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_pass_request_headers on;
        proxy_pass_request_body on;
        set $up_url https://142.132.153.252$request_uri$is_args;
        proxy_pass $up_url;
    }

    # Previews: /uploads/preview/<opts>/<path>
    location ~ ^/uploads/preview/([^/]+)/(.+)$ {
        set $opts $1;
        set $path $2;
        set $imageproxy_path /$opts/https://reblogme.com/uploads/$path;
        proxy_pass http://imageproxy_upstream$imageproxy_path$is_args$args;
    }

    location @404 {
        return 404 "404";
    }

    location = /health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        return 444;
    }
}
