user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    server_tokens off;

    vhost_traffic_status_zone;

    include /etc/nginx/conf.d/sites-enabled/*.conf;
}
